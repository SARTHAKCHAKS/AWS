# backend/template.yaml

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS S3 File Upload System

Globals:
  Function:
    Timeout: 30
    Runtime: python3.9

Resources:
  FileApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,DELETE,OPTIONS'"
        AllowHeaders: "'*'"
        AllowOrigin: "'*'"

  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "s3-upload-system-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - PUT
              - GET
              - DELETE
              - HEAD
            AllowedOrigins:
              - "*"
            MaxAge: 3000

  FileMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: FileMetadataTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  FileUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Environment:
        Variables:
          TABLE_NAME: !Ref FileMetadataTable
          BUCKET_NAME: !Ref UploadBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref UploadBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref FileMetadataTable
      Events:
        GenerateUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref FileApi
            Path: /generate-upload-url
            Method: POST

        GetFiles:
          Type: Api
          Properties:
            RestApiId: !Ref FileApi
            Path: /files
            Method: GET

        DeleteFile:
          Type: Api
          Properties:
            RestApiId: !Ref FileApi
            Path: /files/{id}
            Method: DELETE

Outputs:
  ApiBaseUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${FileApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  BucketName:
    Description: S3 Bucket Name
    Value: !Ref UploadBucket
